<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuyNow — As Melhores Ofertas</title>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18033733721"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18033733721');
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0C0C0C;
      --surface:    #161616;
      --surface2:   #1E1E1E;
      --surface3:   #252525;
      --border:     rgba(255,255,255,0.08);
      --border-md:  rgba(255,255,255,0.14);
      --text:       #F2F2F0;
      --text2:      #888884;
      --text3:      #555552;
      --accent:     #FF4500;
      --accent-lt:  rgba(255,69,0,0.12);
      --accent-glow:rgba(255,69,0,0.25);
      --radius:     12px;
      --radius-lg:  18px;
      --radius-xl:  24px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 10px; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(12,12,12,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 68px; gap: 1.5rem;
    }
    .nav-logo {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: 24px; font-weight: 900; letter-spacing: -0.05em;
      color: var(--text); text-decoration: none; flex-shrink: 0;
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); flex-shrink: 0; }
    .nav-search {
      flex: 1; max-width: 480px;
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 100px; padding: 10px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .nav-search:focus-within { border-color: rgba(255,69,0,0.5); box-shadow: 0 0 0 3px var(--accent-lt); }
    .nav-search svg { width: 15px; height: 15px; stroke: var(--text3); flex-shrink: 0; }
    .nav-search input { border: none; outline: none; background: transparent; font-size: 14px; font-family: inherit; color: var(--text); width: 100%; font-weight: 500; }
    .nav-search input::placeholder { color: var(--text3); }
    .nav-count { font-size: 12px; font-weight: 600; color: var(--text2); background: var(--surface2); border: 1px solid var(--border); padding: 5px 12px; border-radius: 100px; flex-shrink: 0; }

    /* HERO */
    .hero { position: relative; overflow: hidden; padding: 7rem 2.5rem 5rem; text-align: center; }
    .hero-bg { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,69,0,0.12) 0%, transparent 70%); }
    .hero-bg-grid {
      position: absolute; inset: 0; pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
    }
    .hero-inner { position: relative; max-width: 720px; margin: 0 auto; }
    .hero-pill {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600;
      background: var(--accent-lt); border: 1px solid rgba(255,69,0,0.25);
      color: var(--accent); padding: 6px 14px; border-radius: 100px;
      letter-spacing: 0.03em; text-transform: uppercase;
      margin-bottom: 1.75rem; animation: fadeUp 0.5s ease both;
    }
    .hero-pill .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }
    .hero h1 {
      font-family: 'Cabinet Grotesk', sans-serif;
      font-size: clamp(2.6rem, 6vw, 4.5rem);
      font-weight: 900; letter-spacing: -0.05em; line-height: 1.0;
      color: var(--text); margin-bottom: 1.25rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .highlight { background: linear-gradient(135deg, var(--accent), #FF8C00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero p { font-size: 17px; color: var(--text2); line-height: 1.65; max-width: 480px; margin: 0 auto 2.5rem; animation: fadeUp 0.5s 0.2s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    /* MOBILE SEARCH */
    .search-mobile { display: none; margin: 0 1.25rem 1.5rem; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 12px 18px; }
    .search-mobile svg { width: 15px; height: 15px; stroke: var(--text3); flex-shrink: 0; }
    .search-mobile input { border: none; outline: none; background: transparent; font-size: 14px; font-family: inherit; color: var(--text); width: 100%; }
    .search-mobile input::placeholder { color: var(--text3); }

    /* CATS */
    .cat-strip { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 2.5rem 2rem; max-width: 1280px; margin: 0 auto; }
    .cat-btn { padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 100px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .cat-btn:hover { border-color: var(--border-md); color: var(--text); background: var(--surface2); }
    .cat-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 16px var(--accent-glow); }

    /* SECTION */
    .section { padding: 0 2.5rem 5rem; max-width: 1280px; margin: 0 auto; }
    .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; gap: 12px; }
    .section-title { font-family: 'Cabinet Grotesk', sans-serif; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; }
    .count-badge { font-size: 12px; font-weight: 600; color: var(--text3); background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 100px; }

    /* DIVIDER */
    .divider { height: 1px; background: var(--border); max-width: 1280px; margin: 0 auto 3rem; }

    /* GRID */
    .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 14px; }

    /* CARD */
    .product-card {
      background: var(--surface); border-radius: var(--radius-xl);
      border: 1px solid var(--border); overflow: hidden;
      display: flex; flex-direction: column;
      transition: transform 0.22s cubic-bezier(0.16,1,0.3,1), box-shadow 0.22s, border-color 0.22s;
    }
    .product-card:hover { transform: translateY(-5px); border-color: rgba(255,69,0,0.3); box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,69,0,0.15); }
    .product-img-wrap { position: relative; background: var(--surface2); overflow: hidden; }
    .product-img { width: 100%; aspect-ratio: 1/1; object-fit: contain; padding: 1.5rem; display: block; transition: transform 0.3s ease; }
    .product-card:hover .product-img { transform: scale(1.04); }
    .product-img-placeholder { width: 100%; aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; background: var(--surface2); }
    .badge-off { position: absolute; top: 12px; left: 12px; font-size: 11px; font-weight: 800; background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 8px; box-shadow: 0 4px 12px var(--accent-glow); }
    .product-body { padding: 1.1rem 1.25rem 1.25rem; flex: 1; display: flex; flex-direction: column; gap: 8px; }
    .product-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); }
    .product-name { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.4; flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .product-price { font-family: 'Cabinet Grotesk', sans-serif; font-size: 1.25rem; font-weight: 900; letter-spacing: -0.03em; color: var(--text); }
    .old-price { font-size: 12px; font-weight: 500; color: var(--text3); text-decoration: line-through; }
    .btn-buy {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      text-decoration: none; margin-top: 4px;
      padding: 11px 16px; font-size: 13px; font-weight: 700;
      border-radius: var(--radius); border: none; cursor: pointer;
      font-family: inherit; background: var(--accent); color: #fff;
      transition: all 0.15s; box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-buy:hover { background: #e03d00; box-shadow: 0 6px 24px rgba(255,69,0,0.4); transform: translateY(-1px); }
    .btn-buy svg { width: 14px; height: 14px; stroke: #fff; flex-shrink: 0; }

    /* EMPTY */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 5rem 2rem; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .empty-icon { width: 64px; height: 64px; border-radius: 18px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
    .empty-icon svg { width: 28px; height: 28px; stroke: var(--text3); }
    .empty-state h3 { font-family: 'Cabinet Grotesk', sans-serif; font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .empty-state p { font-size: 14px; color: var(--text2); }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 2rem 2.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .footer-logo { font-family: 'Cabinet Grotesk', sans-serif; font-size: 16px; font-weight: 900; letter-spacing: -0.04em; display: flex; align-items: center; gap: 5px; }
    .footer-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
    footer p { font-size: 12px; color: var(--text3); }

    /* TOAST */
    .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 12px 20px; border-radius: var(--radius-lg); font-size: 13px; font-weight: 600; z-index: 500; background: var(--surface2); color: var(--text); border: 1px solid var(--border-md); box-shadow: 0 8px 32px rgba(0,0,0,0.4); opacity: 0; transform: translateY(10px); transition: all 0.25s; pointer-events: none; font-family: inherit; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 768px) {
      nav { padding: 0 1.25rem; }
      .nav-search { display: none; }
      .search-mobile { display: flex; }
      .hero { padding: 4rem 1.25rem 3rem; }
      .section, .cat-strip { padding-left: 1.25rem; padding-right: 1.25rem; }
      footer { padding: 1.5rem 1.25rem; }
    }
    @media (max-width: 480px) {
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .product-body { padding: 0.9rem; }
      .product-price { font-size: 1.05rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">BuyNow<div class="dot"></div></a>
  <div class="nav-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Buscar produtos...">
  </div>
  <span class="nav-count" id="navCount">0 produtos</span>
</nav>

<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-bg-grid"></div>
  <div class="hero-inner">
    <div class="hero-pill"><span class="pill-dot"></span>Ofertas selecionadas</div>
    <h1>As melhores ofertas<br><span class="highlight">numa só página</span></h1>
    <p>Produtos com os melhores preços e condições. Selecionados especialmente para você.</p>
  </div>
</div>

<div class="search-mobile">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
  <input type="text" id="searchInputMobile" placeholder="Buscar produtos...">
</div>

<div class="cat-strip" id="catsWrap">
  <button class="cat-btn active" onclick="filtrarCat('')">Todos</button>
</div>

<div class="divider"></div>

<div class="section">
  <div class="section-head">
    <div class="section-title">Produtos em destaque</div>
    <span class="count-badge" id="countLabel">0 produtos</span>
  </div>
  <div class="products-grid" id="productsGrid"></div>
</div>

<footer>
  <div class="footer-logo">BuyNow<div class="footer-dot"></div></div>
  <p>© 2025 BuyNow · Todos os direitos reservados</p>
</footer>

<div class="toast" id="toast"></div>

<script>
  function getProdutos() {
    try { return JSON.parse(localStorage.getItem('buynow_produtos')||'[]'); } catch { return []; }
  }
  let catAtual = '', searchAtual = '';
  function fmt(v) { return 'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function renderProdutos() {
    const todos = getProdutos();
    const cats  = [...new Set(todos.map(p=>p.cat).filter(Boolean))];
    document.getElementById('navCount').textContent = todos.length+' produto'+(todos.length!==1?'s':'');

    const wrap = document.getElementById('catsWrap');
    wrap.innerHTML = `<button class="cat-btn ${catAtual===''?'active':''}" onclick="filtrarCat('')">Todos</button>`;
    cats.forEach(c => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn'+(catAtual===c?' active':'');
      btn.textContent = c;
      btn.onclick = () => filtrarCat(c);
      wrap.appendChild(btn);
    });

    let lista = todos;
    if (catAtual) lista = lista.filter(p=>p.cat===catAtual);
    if (searchAtual) {
      const q = searchAtual.toLowerCase();
      lista = lista.filter(p=>p.nome.toLowerCase().includes(q)||(p.cat||'').toLowerCase().includes(q));
    }
    document.getElementById('countLabel').textContent = lista.length+' produto'+(lista.length!==1?'s':'');

    const grid = document.getElementById('productsGrid');
    if (!lista.length) {
      grid.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></div><h3>Nenhum produto encontrado</h3><p>Tente buscar por outro termo ou categoria</p></div>`;
      return;
    }

    grid.innerHTML = lista.map(p => {
      const off = p.precoAntigo && p.precoAntigo>p.preco ? Math.round((1-p.preco/p.precoAntigo)*100) : 0;
      const imgEl = p.imagem ? `<img class="product-img" src="${p.imagem}" alt="${p.nome}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : '';
      const ph = `<div class="product-img-placeholder" ${p.imagem?'style="display:none"':''}>${p.emoji||'🛍️'}</div>`;
      return `<div class="product-card">
        <div class="product-img-wrap">
          ${imgEl}${ph}
          ${off>0?`<div class="badge-off">-${off}%</div>`:''}
        </div>
        <div class="product-body">
          <div class="product-cat">${p.cat||'Geral'}</div>
          <div class="product-name">${p.nome}</div>
          <div class="product-price-row">
            <span class="product-price">${fmt(p.preco)}</span>
            ${p.precoAntigo&&p.precoAntigo>p.preco?`<span class="old-price">${fmt(p.precoAntigo)}</span>`:''}
          </div>
          <a class="btn-buy" href="${p.link}" target="_blank" rel="nofollow noopener"
            onclick="gtag('event','conversion',{'send_to':'AW-18033733721'})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            Ver oferta
          </a>
        </div>
      </div>`;
    }).join('');
  }

  function filtrarCat(cat) { catAtual = cat; renderProdutos(); }

  function handleSearch(val) {
    searchAtual = val;
    document.getElementById('searchInput').value = val;
    document.getElementById('searchInputMobile').value = val;
    renderProdutos();
  }
  document.getElementById('searchInput').addEventListener('input', e => handleSearch(e.target.value.trim()));
  document.getElementById('searchInputMobile').addEventListener('input', e => handleSearch(e.target.value.trim()));
  document.addEventListener('visibilitychange', () => { if(!document.hidden) renderProdutos(); });

  renderProdutos();
</script>
</body>
</html>
